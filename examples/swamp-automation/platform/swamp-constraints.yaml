# NOTE: This policy is illustrative. The primary Swamp fit is structural
# workflow-change governance (model/method usage, required steps, vault safety).
# Local cub-gen flows produce evidence quickly; connected flows publish the same
# evidence for centralized audit/reporting.

apiVersion: confighub.io/v1
kind: WorkflowPolicy
metadata:
  name: swamp-workflow-constraints
spec:
  approved_models:
    - app-validator
    - app-deployer
    - app-healthcheck
    - credential-rotator
    - secret-manager
  approved_model_methods:
    app-validator: [check, verify_deployment, verify_connectivity]
    app-deployer: [apply, rollback]
    app-healthcheck: [verify]
    credential-rotator: [rotate]
    secret-manager: [generate_credentials, distribute]
  execution_windows:
    production:
      allowed: "Mon-Fri 06:00-22:00 UTC"
      reason: "No production deployments outside business hours"
  required_steps:
    - name: validate
      reason: "All deployment workflows must include a validation step"
  forbidden_step_names:
    - delete-production-database
  max_steps_per_job: 20
  max_parallel_jobs: 5
  vault_policy:
    required_type: local-encryption
    key_rotation_days: 90
