replicaCount: 2

image:
  repository: ghcr.io/example/payments-api
  tag: v1.0.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

appConfig:
  featureFlags:
    fastCheckout: false
  logLevel: info

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
