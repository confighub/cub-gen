apiVersion: score.dev/v1b1
kind: Workload
metadata:
  name: checkout-api
  annotations:
    owner: app-team-checkout
containers:
  main:
    image: ghcr.io/example/checkout-api:v1.0.0
    variables:
      LOG_LEVEL: info
      DB_HOST: ${resources.db.host}
      DB_PORT: ${resources.db.port}
      CACHE_HOST: ${resources.cache.host}
service:
  ports:
    web:
      port: 8080
      targetPort: 8080
resources:
  db:
    type: postgres
  cache:
    type: redis
  dns:
    type: dns
