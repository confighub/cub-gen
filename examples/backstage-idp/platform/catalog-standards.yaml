apiVersion: confighub.io/v1
kind: CatalogStandard
metadata:
  name: backstage-catalog-requirements
spec:
  required_fields:
    - path: spec.owner
      reason: "Every component must have an owner"
    - path: spec.type
      reason: "Every component must declare its type"
    - path: spec.lifecycle
      reason: "Every component must declare its lifecycle stage"
  valid_lifecycles:
    - experimental
    - production
    - deprecated
  valid_types:
    - service
    - website
    - library
    - documentation
  naming_convention:
    pattern: "^[a-z][a-z0-9-]{2,50}$"
    reason: "Component names must be lowercase, alphanumeric with hyphens, 3-50 chars"
