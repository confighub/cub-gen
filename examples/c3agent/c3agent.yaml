service: c3agent
apiVersion: c3agent/v1
fleet:
  name: coding-fleet
  max_concurrent_tasks: 2
  agent_model: claude-sonnet-4-20250514
  schedule_interval_secs: 5
agent_runtime:
  image: ghcr.io/confighubai/c3agent:latest
  max_budget_usd: 5.0
  repo_cache_dir: /data/repos
  session_dir: /data/claude
components:
  controlplane:
    grpc_port: 50050
    http_port: 8080
    replicas: 1
  gateway:
    grpc_port: 50052
    replicas: 1
storage:
  task_pvc: c3agent-taskdata
  task_pvc_size: 50Gi
credentials:
  anthropic_key_ref: ANTHROPIC_API_KEY
  slack_bot_token_ref: SLACK_BOT_TOKEN
  slack_app_token_ref: SLACK_APP_TOKEN
  github_token_ref: GH_TOKEN
  database_url_ref: DATABASE_URL
