apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-demo
  namespace: demo-live
  annotations:
    demo.confighub.io/revision: v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aiops-demo
  template:
    metadata:
      labels:
        app: aiops-demo
        demo.confighub.io/revision: v2
    spec:
      containers:
        - name: web
          image: nginx:1.27.1
          ports:
            - containerPort: 80
          env:
            - name: APP_REV
              value: v2
