kind: "c3agent"
profile: "c3agent"
resource_kind: "ConfigMap"
resource_type: "v1/ConfigMap"
capabilities:
  - "fleet-config"
  - "agent-orchestration"
  - "inverse-fleet-config-patch"
contract:
  default_input_role: "fleet-config"
  default_owner: "app-team"
  input_role_rules:
    - role: "fleet-config-base"
      exact_basenames:
        - "c3agent.yaml"
        - "c3agent.yml"
        - "c3agent.json"
    - role: "fleet-config-overlay"
      prefixes:
        - "c3agent-"
      extensions:
        - ".yaml"
        - ".yml"
        - ".json"
  role_schema_refs:
    fleet-config-base: "https://schema.confighub.dev/generators/c3agent-v1"
    fleet-config-overlay: "https://schema.confighub.dev/generators/c3agent-v1"
  wet_targets:
    - kind: "ConfigMap"
      name_template: "{{name}}-fleet-config"
      owner: "platform-runtime"
      namespace: "apps"
      source_dry_path_template: "fleet.agent_model"
    - kind: "Secret"
      name_template: "{{name}}-fleet-credentials"
      owner: "platform-runtime"
      namespace: "apps"
      source_dry_path_template: "credentials.anthropic_key_ref"
    - kind: "Deployment"
      name_template: "{{name}}-controlplane"
      owner: "platform-runtime"
      namespace: "apps"
      source_dry_path_template: "components.controlplane.replicas"
    - kind: "Deployment"
      name_template: "{{name}}-gateway"
      owner: "platform-runtime"
      namespace: "apps"
      source_dry_path_template: "components.gateway.replicas"
    - kind: "Service"
      name_template: "{{name}}-controlplane"
      owner: "platform-runtime"
      namespace: "apps"
      source_dry_path_template: "components.controlplane.grpc_port"
    - kind: "Service"
      name_template: "{{name}}-gateway"
      owner: "platform-runtime"
      namespace: "apps"
      source_dry_path_template: "components.gateway.grpc_port"
    - kind: "ServiceAccount"
      name_template: "{{name}}-agent"
      owner: "platform-runtime"
      namespace: "apps"
      source_dry_path_template: "service"
    - kind: "ClusterRole"
      name_template: "{{name}}-job-runner"
      owner: "platform-runtime"
      source_dry_path_template: "service"
    - kind: "ClusterRoleBinding"
      name_template: "{{name}}-job-runner"
      owner: "platform-runtime"
      source_dry_path_template: "service"
    - kind: "PersistentVolumeClaim"
      name_template: "{{name}}-taskdata"
      owner: "platform-runtime"
      namespace: "apps"
      source_dry_path_template: "storage.task_pvc_size"
    - kind: "ConfigMap"
      name_template: "{{name}}-job-template"
      owner: "platform-runtime"
      namespace: "apps"
      source_dry_path_template: "agent_runtime.image"
provenance:
  field_origin_transform: "c3agent-config-to-runtime"
  field_origin_overlay_transform: "c3agent-overlay-merge"
  field_origin_confidences:
    agent_runtime: 0.88
    component_ports_base: 0.84
    component_ports_overlay: 0.80
    credentials: 0.86
    fleet_config: 0.91
    rbac: 0.82
    replicas_base: 0.89
    replicas_overlay: 0.85
    storage: 0.85
  rendered_lineage_templates:
    - kind: "ConfigMap"
      name_template: "{{name}}-fleet-config"
      namespace: "apps"
      source_path_hint: "base_config_path"
      source_dry_path_template: "fleet.agent_model"
    - kind: "Secret"
      name_template: "{{name}}-fleet-credentials"
      namespace: "apps"
      source_path_hint: "base_config_path"
      source_dry_path_template: "credentials.anthropic_key_ref"
    - kind: "Deployment"
      name_template: "{{name}}-controlplane"
      namespace: "apps"
      source_path_hint: "base_config_path"
      source_dry_path_template: "components.controlplane.replicas"
    - kind: "Deployment"
      name_template: "{{name}}-gateway"
      namespace: "apps"
      source_path_hint: "base_config_path"
      source_dry_path_template: "components.gateway.replicas"
    - kind: "Service"
      name_template: "{{name}}-controlplane"
      namespace: "apps"
      source_path_hint: "base_config_path"
      source_dry_path_template: "components.controlplane.grpc_port"
    - kind: "Service"
      name_template: "{{name}}-gateway"
      namespace: "apps"
      source_path_hint: "base_config_path"
      source_dry_path_template: "components.gateway.grpc_port"
    - kind: "ServiceAccount"
      name_template: "{{name}}-agent"
      namespace: "apps"
      source_path_hint: "base_config_path"
      source_dry_path_template: "service"
    - kind: "ClusterRole"
      name_template: "{{name}}-job-runner"
      source_path_hint: "base_config_path"
      source_dry_path_template: "service"
    - kind: "ClusterRoleBinding"
      name_template: "{{name}}-job-runner"
      source_path_hint: "base_config_path"
      source_dry_path_template: "service"
    - kind: "PersistentVolumeClaim"
      name_template: "{{name}}-taskdata"
      namespace: "apps"
      source_path_hint: "base_config_path"
      source_dry_path_template: "storage.task_pvc_size"
    - kind: "ConfigMap"
      name_template: "{{name}}-job-template"
      namespace: "apps"
      source_path_hint: "base_config_path"
      source_dry_path_template: "agent_runtime.image"
inverse:
  inverse_patch_templates:
    agent_runtime:
      editable_by: "platform-engineer"
      confidence: 0.88
      requires_review: true
    component_ports:
      editable_by: "platform-engineer"
      confidence: 0.84
      requires_review: true
    credentials:
      editable_by: "platform-engineer"
      confidence: 0.86
      requires_review: true
    fleet_config:
      editable_by: "app-team"
      confidence: 0.91
    rbac:
      editable_by: "platform-engineer"
      confidence: 0.82
      requires_review: true
    replicas:
      editable_by: "app-team"
      confidence: 0.89
    storage:
      editable_by: "platform-engineer"
      confidence: 0.85
      requires_review: true
  inverse_pointer_templates:
    agent_runtime:
      owner: "platform-engineer"
      confidence: 0.88
    component_ports:
      owner: "platform-engineer"
      confidence: 0.84
    credentials:
      owner: "platform-engineer"
      confidence: 0.86
    fleet_config:
      owner: "app-team"
      confidence: 0.91
    rbac:
      owner: "platform-engineer"
      confidence: 0.82
    replicas:
      owner: "app-team"
      confidence: 0.89
    storage:
      owner: "platform-engineer"
      confidence: 0.85
  inverse_patch_reasons:
    agent_runtime: "Agent runtime image and budget settings affect platform execution behavior."
    component_ports: "Component port changes affect platform networking and service mesh."
    credentials: "Credential references impact platform secret management."
    fleet_config: "Fleet configuration (model, concurrency) is sourced from {{base_config_path}}."
    rbac: "RBAC resources are platform-governed and must align with security policy."
    replicas: "Replica tuning affects fleet concurrency and runtime cost."
    storage: "Storage sizing and binding affect persistent runtime state."
  inverse_edit_hints:
    agent_runtime: "Edit agent_runtime.image or agent_runtime.max_budget_usd in {{base_config_path}}."
    component_ports_base: "Edit components.controlplane.grpc_port or components.gateway.grpc_port in {{base_config_path}}."
    component_ports_overlay: "Edit component ports in {{overlay_config_path}} for environment-specific values; use {{base_config_path}} for defaults."
    credentials: "Edit credentials section in {{base_config_path}} and coordinate with platform secret management."
    fleet_config: "Edit fleet.agent_model or fleet.max_concurrent_tasks in {{base_config_path}}."
    rbac: "Edit service identity in {{base_config_path}} and coordinate with platform security owners."
    replicas_base: "Edit components.controlplane.replicas or components.gateway.replicas in {{base_config_path}}."
    replicas_overlay: "Edit component replica counts in {{overlay_config_path}} for environment-specific values; use {{base_config_path}} for defaults."
    storage: "Edit storage.task_pvc or storage.task_pvc_size in {{base_config_path}}."
hints:
  defaults:
    base_config_path: "c3agent.yaml"
