kind: "no-config-platform"
profile: "no-config-platform"
resource_kind: "ConfigMap"
resource_type: "v1/ConfigMap"
capabilities:
  - "app-config-only"
  - "provider-config"
  - "inverse-provider-config-patch"
contract:
  default_input_role: "provider-config"
  default_owner: "app-team"
  input_role_rules:
    - role: "provider-config-base"
      exact_basenames:
        - "no-config-platform.yaml"
        - "no-config-platform.yml"
        - "no-config-platform.json"
    - role: "provider-config-overlay"
      prefixes:
        - "no-config-platform-"
      extensions:
        - ".yaml"
        - ".yml"
        - ".json"
  role_schema_refs:
    provider-config-base: "https://schema.confighub.dev/generators/no-config-platform-v1"
    provider-config-overlay: "https://schema.confighub.dev/generators/no-config-platform-v1"
  wet_targets:
    - kind: "ConfigMap"
      name_template: "{{name}}-provider-config"
      owner: "platform-runtime"
      namespace: "apps"
      source_dry_path_template: "app.environment"
    - kind: "Secret"
      name_template: "{{name}}-provider-credentials"
      owner: "platform-runtime"
      namespace: "apps"
      source_dry_path_template: "credentials.api_key_ref"
provenance:
  field_origin_transform: "no-config-platform-to-runtime"
  field_origin_overlay_transform: "no-config-platform-overlay-merge"
  field_origin_confidences:
    channels_base: 0.88
    channels_overlay: 0.84
    environment: 0.90
  rendered_lineage_templates:
    - kind: "ConfigMap"
      name_template: "{{name}}-provider-config"
      namespace: "apps"
      source_path_hint: "base_config_path"
      source_dry_path_template: "app.environment"
    - kind: "Secret"
      name_template: "{{name}}-provider-credentials"
      namespace: "apps"
      source_path_hint: "base_config_path"
      source_dry_path_template: "credentials.api_key_ref"
    - kind: "ConfigMap"
      name_template: "{{name}}-provider-config"
      namespace: "apps"
      source_path_hint: "overlay_config_path"
      source_dry_path_template: "channels.inbound"
      optional: true
inverse:
  inverse_patch_templates:
    channels:
      editable_by: "app-team"
      confidence: 0.88
    environment:
      editable_by: "app-team"
      confidence: 0.90
  inverse_pointer_templates:
    channels:
      owner: "app-team"
      confidence: 0.88
    environment:
      owner: "app-team"
      confidence: 0.90
  inverse_patch_reasons:
    channels: "Channel mapping is app-level runtime behavior."
    environment: "Environment is sourced from {{base_config_path}}."
  inverse_edit_hints:
    channels_base: "Edit channels.inbound in {{base_config_path}}."
    channels_overlay: "Edit channels.inbound in {{overlay_config_path}} for environment-specific behavior; use {{base_config_path}} for defaults."
    environment: "Edit app.environment in {{base_config_path}}."
hints:
  defaults:
    base_config_path: "no-config-platform.yaml"
