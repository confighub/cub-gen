name: Connected Story 7 CI Flow

on:
  workflow_dispatch:
    inputs:
      example_slug:
        description: "Example slug under examples/"
        required: false
        default: "helm-paas"

jobs:
  story7:
    runs-on: ubuntu-latest
    env:
      CONFIGHUB_BASE_URL: ${{ secrets.CONFIGHUB_BASE_URL }}
      CONFIGHUB_SPACE: ${{ secrets.CONFIGHUB_SPACE }}
      CONFIGHUB_TOKEN: ${{ secrets.CONFIGHUB_TOKEN }}
      CONFIGHUB_USER: ci-bot
      EXAMPLE_SLUG: ${{ inputs.example_slug }}
      RUN_ID: ${{ github.run_id }}
      VERIFIER: ci-bot
      DECISION_STATE: ALLOW
      DECISION_POLICY_REF: policy/ci/default
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$CONFIGHUB_BASE_URL"
          test -n "$CONFIGHUB_SPACE"
          test -n "$CONFIGHUB_TOKEN"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build cub CLI for connected scripts
        run: |
          git clone --depth 1 https://github.com/confighubai/confighub.git /tmp/confighub
          make -C /tmp/confighub build-cli
          echo "/tmp/confighub/bin" >> "$GITHUB_PATH"

      - name: Run story 7 connected CI flow
        run: ./examples/demo/story-7-ci-api-flow-connected.sh
