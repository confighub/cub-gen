name: Connected Story 7 CI Flow

on:
  workflow_dispatch:
    inputs:
      example_slug:
        description: "Example slug under examples/"
        required: false
        default: "helm-paas"

jobs:
  story7:
    runs-on: ubuntu-latest
    env:
      CONFIGHUB_BASE_URL: ${{ secrets.CONFIGHUB_BASE_URL }}
      CONFIGHUB_SPACE: ${{ secrets.CONFIGHUB_SPACE }}
      CONFIGHUB_TOKEN: ${{ secrets.CONFIGHUB_TOKEN }}
      CONFIGHUB_USER: ci-bot
      CONNECTED_FALLBACK_MODE: off
      REQUIRE_TERMINAL_DECISION: "1"
      EXAMPLE_SLUG: ${{ inputs.example_slug }}
      RUN_ID: ${{ github.run_id }}
      VERIFIER: ci-bot
      OUT_DIR: .tmp/ci-connected/${{ github.run_id }}/${{ inputs.example_slug }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          test -n "$CONFIGHUB_BASE_URL"
          test -n "$CONFIGHUB_SPACE"
          test -n "$CONFIGHUB_TOKEN"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build cub CLI for connected scripts
        run: |
          git clone --depth 1 https://github.com/confighubai/confighub.git /tmp/confighub
          make -C /tmp/confighub build-cli
          echo "/tmp/confighub/bin" >> "$GITHUB_PATH"

      - name: Run story 7 connected CI flow
        run: ./examples/demo/story-7-ci-api-flow-connected.sh

      - name: Upload story 7 summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: story-7-summary-${{ inputs.example_slug }}
          path: |
            ${{ env.OUT_DIR }}/change-run.json
            ${{ env.OUT_DIR }}/change-explain.json
            ${{ env.OUT_DIR }}/story-7-summary.json
