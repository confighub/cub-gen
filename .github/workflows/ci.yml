name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Build + Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l .)" || (echo "Run gofmt on listed files" && gofmt -l . && exit 1)

      - name: Build
        run: go build ./cmd/cub-gen

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -v

  parity:
    name: CLI Parity
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run contract tests
        run: make test-contracts

      - name: Run bridge symmetry matrix
        run: make test-bridge-symmetry
