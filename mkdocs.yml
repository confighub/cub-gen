site_name: cub-gen
site_description: Deterministic Git-native generator importer with command-shape parity to cub gitops
repo_url: https://github.com/confighub/cub-gen
repo_name: confighub/cub-gen
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

# Files not listed in nav are still built but hidden from navigation.
# To fully exclude internal docs from the build, add patterns here.
# Note: mkdocs-exclude plugin is not used due to MkDocs version compatibility.
exclude_docs: |
  agentic-gitops/agentic-gitops-design.md
  agentic-gitops/next-gen-gitops-ai-era.md
  agentic-gitops/scoredev-dry-wet-unit-worked-example.md
  agentic-gitops/traefik-helm-dry-wet-unit-worked-example.md
  agentic-gitops/dual-approval-gitops-gh-pr-and-ch-mr.md
  agentic-gitops/stored-in-git-vs-confighub.md
  agentic-gitops/gitops-checkpoint-schemas.md
  agentic-gitops/cub-track-internal-decision-memo.md
  agentic-gitops/2026-gitops6-in-full-do-not-archive.md
  agentic-gitops/schemas/
  agentic-gitops/scripts/
  agentic-gitops/.github/
  agentic-gitops/05-rollout/20-cub-track-internal-decision-memo.md
  agentic-gitops/05-rollout/90-today-demo-plan.md
  agentic-gitops/05-rollout/91-speaker-sheet-today.md
  agentic-gitops/05-rollout/92-two-minute-modules.md
  agentic-gitops/05-rollout/93-live-run-checklist.md
  agentic-gitops/00-index/01-new-inputs-and-feedback.md
  execution-board-sprint-1-and-2.md
  roadmap-v0.1-first-3-examples.md
  roadmap-v0.2-preview.md
  plans/
  spec-yaml-generator-bundles.md
  workflows/persona-value-playbook.md
  *.pdf

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/confighub/cub-gen

